name: CI/CD

on:
  push:
    branches: [main, dev]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main]
    types:    [opened, synchronize, reopened]
  release:
    types: [published]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: write   # für GitHub Release erstellen
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Versionsnummer ermitteln
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="sha-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Image-Metadaten
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/corexmanagement/topograph
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build & Push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=topograph
          cache-to:   type=gha,mode=max,scope=topograph

      # GitHub Release erstellen (nur auf main, nicht bei PRs/dev-branches)
      - name: GitHub Release erstellen
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ steps.version.outputs.version }}"
          DATE=$(date -u +"%d.%m.%Y %H:%M UTC")

          # Letzten Release-Tag finden für Changelog-Bereich
          LAST_TAG=$(git tag --sort=-creatordate | head -1)

          # Commit-Liste seit letztem Tag (oder letzte 20 Commits)
          if [ -n "$LAST_TAG" ]; then
            RAW_LOG=$(git log "${LAST_TAG}..HEAD" --format="- %s" 2>/dev/null)
          else
            RAW_LOG=$(git log --format="- %s" -20)
          fi

          # Commits nach Typ gruppieren
          FEATS=$(echo "$RAW_LOG" | grep -E "^- feat(\(.+\))?:" || true)
          FIXES=$(echo "$RAW_LOG" | grep -E "^- fix(\(.+\))?:" || true)
          CI=$(echo "$RAW_LOG" | grep -E "^- ci(\(.+\))?:" || true)
          OTHERS=$(echo "$RAW_LOG" | grep -vE "^- (feat|fix|ci)(\(.+\))?:" || true)

          BODY="## Änderungen in \`${SHA}\`"
          [ -n "$FEATS" ]  && BODY="${BODY}\n\n### ✨ Neu\n${FEATS}"
          [ -n "$FIXES" ]  && BODY="${BODY}\n\n### 🐛 Behoben\n${FIXES}"
          [ -n "$CI" ]     && BODY="${BODY}\n\n### ⚙️ CI / Infra\n${CI}"
          [ -n "$OTHERS" ] && BODY="${BODY}\n\n### 🔧 Sonstiges\n${OTHERS}"
          BODY="${BODY}\n\n---\n_Build: ${DATE}_"

          # Release erstellen (überschreibt falls SHA-Tag schon existiert)
          gh release delete "${SHA}" --yes 2>/dev/null || true
          gh release create "${SHA}" \
            --title "${DATE} · ${SHA}" \
            --notes "$(printf '%b' "$BODY")" \
            --latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    continue-on-error: true
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER:  ${{ github.actor }}
        with:
          host:     ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/topograph
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f --filter "until=24h"
            echo "Deployed @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
