services:
  nexdocs:
    image: ghcr.io/corexmanagement/nexos-internal-docs:latest
    container_name: nexos-internal-docs
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/auth/session || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
